# ============================================
# OpenClaw Trend Digest — Cloudflare Worker Config
# ============================================
# 
# Setup:
#   1. npm run db:create          → Buat D1 database
#   2. Isi database_id di bawah   → Dari output langkah 1
#   3. npm run db:migrate         → Jalankan schema.sql
#   4. wrangler secret put GROQ_API_KEY → Set API keys
#   5. npm run deploy             → Deploy worker
# ============================================

name = "openclaw-trend-digest"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# ===== Cron Triggers =====
# Berjalan setiap hari jam 23:00 UTC = 06:00 WIB
[triggers]
crons = ["0 23 * * *"]

# ===== D1 Database Binding =====
[[d1_databases]]
binding = "DB"
database_name = "openclaw-digest-db"
database_id = "YOUR_DATABASE_ID_HERE"    # ← Ganti setelah `npm run db:create`

# ===== Environment Variables (non-secret) =====
[vars]
MAX_TOPICS = "7"
MIN_RELEVANCE_SCORE = "5"
LOG_LEVEL = "info"
ENVIRONMENT = "production"

# ===== Secrets (set via `wrangler secret put <NAME>`) =====
# GROQ_API_KEY         → wrangler secret put GROQ_API_KEY
# TELEGRAM_BOT_TOKEN   → wrangler secret put TELEGRAM_BOT_TOKEN
# TELEGRAM_CHAT_ID     → wrangler secret put TELEGRAM_CHAT_ID
# DISCORD_WEBHOOK_URL  → wrangler secret put DISCORD_WEBHOOK_URL

# ===== Dev Environment (local) =====
[env.dev]
name = "openclaw-trend-digest-dev"
[env.dev.vars]
LOG_LEVEL = "debug"
ENVIRONMENT = "development"
