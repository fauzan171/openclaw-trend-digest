# ============================================
# OpenClaw Trend Digest — GitHub Actions: Daily Cron Job
# Tim 5: DevOps & Automation Team
# ============================================
# 
# Workflow ini berjalan otomatis setiap hari pada jam 23:00 UTC (06:00 WIB).
# Juga bisa di-trigger manual via "workflow_dispatch" button di GitHub UI.
# ============================================

name: 🌅 Daily Trend Digest

on:
  schedule:
    # Jam 23:00 UTC = 06:00 WIB (pagi hari)
    - cron: '0 23 * * *'
  
  # Trigger manual (untuk testing)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (skip delivery)'
        required: false
        default: 'false'
        type: boolean

# Hanya izinkan 1 run concurrent (avoid duplicate digests)
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  run-digest:
    name: 📰 Generate & Deliver Digest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Build TypeScript
        run: npm run build

      - name: 🚀 Run Digest Pipeline
        run: npm run start
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          MAX_TOPICS: '7'
          MIN_RELEVANCE_SCORE: '5'
          LOG_LEVEL: 'info'

      - name: 📊 Pipeline Status
        if: always()
        run: |
          echo "============================================"
          echo "📅 Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📊 Exit code: ${{ job.status }}"
          echo "============================================"
