# ============================================
# OpenClaw Trend Digest — GitHub Actions: CI Pipeline
# Tim 5: DevOps & Automation Team
# ============================================
#
# Berjalan pada setiap push/PR ke main.
# Memastikan kode selalu clean, type-safe, dan tested.
# ============================================

name: 🔍 CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    name: 🧹 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 TypeScript Type Check
        run: npm run typecheck

      - name: 🧹 ESLint
        run: npm run lint
        continue-on-error: true

      - name: 🔨 Build
        run: npm run build

  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧪 Run Tests
        run: npm run test
        env:
          # Test environment — use dummy values
          GROQ_API_KEY: 'test-key'
          TELEGRAM_BOT_TOKEN: 'test-token'
          TELEGRAM_CHAT_ID: 'test-chat-id'
          DISCORD_WEBHOOK_URL: 'https://discord.com/test'
          LOG_LEVEL: 'error'
